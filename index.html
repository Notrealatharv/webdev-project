<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile Card</title>
    <!-- Linking External CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="card-container">
        <!-- Profile Card -->
        <div class="profile-card">
            <div class="image-section">
                <!-- Replace 'profile.jpg' with your actual image file -->
                <img src="ak.jpeg" alt="Profile Picture" class="profile-img">
            </div>

            <div class="content-section">
                <h1 class="name">Atharv Kate</h1>
                <p class="role">Student & Developer</p>
                <p class="description">
                    Welcome to my profile! I am a passionate developer currently exploring new technologies and building cool projects.
                </p>

                <!-- Interaction Section -->
              <div class="action-buttons">
    <a href="https://www.instagram.com/_notrealatharv_?igsh=ODVpYzZ4bzUzYWRo" target="_blank" class="btn follow-btn">Follow</a>
    <a href="mailto:atharvkate06@gmail.com" class="btn message-btn">Message</a>
</div>
            </div>
        </div>
    </div>

</body>

</html>
